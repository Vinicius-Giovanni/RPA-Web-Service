<!DOCTYPE html>
<html>
<head>
    <title>Emitir Relatório</title>
</head>
<body>

    <button onclick="emitir()">
        Emitir relatório
    </button>

    <script>

        async function emitir() {

            const resposta = await fetch(
                '/emitir-relatorio',
                {
                    method: 'POST'
                }
            )

            const dados = await resposta.json()

            alert(dados.mensagem)
        }

    </script>

</body>
</html>
